<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ClearanceSync — Student Clearance Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #6b1a1a; --navy-light: #8b2a2a; --gold: #c9a84c; --gold-light: #e8c97a;
    --cream: #fdf9f3; --white: #ffffff; --text: #1a1a2e; --muted: #6b7280;
    --success: #16a34a; --success-bg: #dcfce7; --danger: #dc2626; --danger-bg: #fee2e2;
    --warn: #d97706; --warn-bg: #fef3c7; --info: #1d4ed8; --info-bg: #dbeafe;
    --border: #e5e7eb; --shadow: 0 4px 24px rgba(107,26,26,0.10);
    --radius: 12px; --radius-lg: 18px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
  h1,h2,h3,h4 { font-family: 'Playfair Display', serif; }
  button { cursor: pointer; font-family: 'DM Sans', sans-serif; }
  input, select, textarea { font-family: 'DM Sans', sans-serif; }

  /* ---- SCROLLBAR ---- */
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #f1f1f1; }
  ::-webkit-scrollbar-thumb { background: var(--navy-light); border-radius: 3px; }

  /* ---- ANIMATIONS ---- */
  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }
  @keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .fade-up { animation: fadeUp 0.5s ease forwards; }
  .fade-in { animation: fadeIn 0.4s ease forwards; }

  /* ---- BTN ---- */
  .btn { display:inline-flex; align-items:center; gap:6px; padding:10px 20px; border-radius:8px; font-size:14px; font-weight:500; border:none; transition:all .2s; }
  .btn-primary { background:var(--navy); color:#fff; } .btn-primary:hover { background:var(--navy-light); }
  .btn-gold { background:var(--gold); color:var(--navy); } .btn-gold:hover { background:var(--gold-light); }
  .btn-outline { background:transparent; border:1.5px solid var(--navy); color:var(--navy); } .btn-outline:hover { background:var(--navy); color:#fff; }
  .btn-danger { background:var(--danger); color:#fff; } .btn-danger:hover { opacity:.9; }
  .btn-success { background:var(--success); color:#fff; } .btn-success:hover { opacity:.9; }
  .btn-sm { padding:6px 14px; font-size:13px; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }

  /* ---- FORM ---- */
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:13px; font-weight:500; margin-bottom:6px; color:var(--text); }
  .form-group input, .form-group select, .form-group textarea {
    width:100%; padding:10px 14px; border:1.5px solid var(--border); border-radius:8px;
    font-size:14px; background:#fff; transition:border-color .2s; outline:none;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--navy); }
  .form-group textarea { resize:vertical; min-height:80px; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }

  /* ---- BADGE ---- */
  .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:500; }
  .badge-success { background:var(--success-bg); color:var(--success); }
  .badge-danger { background:var(--danger-bg); color:var(--danger); }
  .badge-warn { background:var(--warn-bg); color:var(--warn); }
  .badge-info { background:var(--info-bg); color:var(--info); }
  .badge-gray { background:#f3f4f6; color:#374151; }

  /* ---- CARD ---- */
  .card { background:#fff; border-radius:var(--radius-lg); box-shadow:var(--shadow); padding:24px; }

  /* ---- NAV ---- */
  .nav { background:var(--navy); color:#fff; padding:0 32px; display:flex; align-items:center; height:64px; gap:16px; position:sticky; top:0; z-index:100; }
  .nav-brand { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; color:var(--gold); flex:1; }
  .nav-user { display:flex; align-items:center; gap:10px; font-size:14px; }
  .nav-avatar { width:36px; height:36px; border-radius:50%; background:var(--gold); display:flex; align-items:center; justify-content:center; font-weight:600; font-size:14px; color:var(--navy); }
  .nav-notif { position:relative; }
  .notif-badge { position:absolute; top:-4px; right:-4px; background:var(--danger); color:#fff; border-radius:50%; width:16px; height:16px; font-size:10px; display:flex; align-items:center; justify-content:center; }

  /* ---- SIDEBAR ---- */
  .layout { display:flex; min-height:calc(100vh - 64px); }
  .sidebar { width:240px; background:var(--navy); color:#fff; padding:24px 0; flex-shrink:0; }
  .sidebar-menu { list-style:none; }
  .sidebar-item { padding:12px 24px; cursor:pointer; display:flex; align-items:center; gap:10px; font-size:14px; transition:background .2s; border-left:3px solid transparent; }
  .sidebar-item:hover, .sidebar-item.active { background:rgba(201,168,76,.12); border-left-color:var(--gold); color:var(--gold-light); }
  .sidebar-item.active { font-weight:600; }
  .main-content { flex:1; padding:32px; overflow-y:auto; }

  /* ---- LANDING ---- */
  .landing { min-height:100vh; }
  .hero { background:linear-gradient(135deg, #4a0e0e 0%, #6b1a1a 50%, #8b2a2a 100%); color:#fff; padding:80px 40px 60px; text-align:center; position:relative; overflow:hidden; }
  .hero::before { content:''; position:absolute; inset:0; background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
  .hero-title { font-size:clamp(36px,5vw,64px); font-weight:700; color:var(--gold); margin-bottom:16px; position:relative; }
  .hero-sub { font-size:clamp(16px,2vw,20px); opacity:.85; max-width:640px; margin:0 auto 40px; position:relative; }
  .hero-btns { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; position:relative; }

  .ai-photos { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; padding:60px 40px; max-width:1200px; margin:0 auto; }
  .ai-photo-card { border-radius:var(--radius-lg); overflow:hidden; position:relative; aspect-ratio:4/3; }
  .ai-photo-card img { width:100%; height:100%; object-fit:cover; }
  .ai-photo-overlay { position:absolute; inset:0; background:linear-gradient(to top,rgba(15,31,61,.7) 0%,transparent 60%); display:flex; align-items:flex-end; padding:20px; }
  .ai-photo-label { color:#fff; font-weight:600; font-size:16px; }

  .features { background:var(--navy); color:#fff; padding:60px 40px; text-align:center; }
  .features-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:24px; max-width:1000px; margin:32px auto 0; }
  .feature-card { background:rgba(255,255,255,.06); border-radius:var(--radius); padding:24px; border:1px solid rgba(201,168,76,.2); }
  .feature-icon { font-size:32px; margin-bottom:12px; }
  .feature-title { color:var(--gold); font-size:15px; font-weight:600; margin-bottom:8px; }
  .feature-desc { font-size:13px; opacity:.7; }

  /* ---- AUTH ---- */
  .auth-container { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--cream); padding:24px; }
  .auth-card { background:#fff; border-radius:var(--radius-lg); box-shadow:var(--shadow); padding:40px; width:100%; max-width:480px; }
  .auth-logo { text-align:center; margin-bottom:28px; }
  .auth-logo h1 { font-size:28px; color:var(--navy); }
  .auth-logo p { color:var(--muted); font-size:14px; }

  /* ---- CLEARANCE TRACKER ---- */
  .offices-grid { display:flex; flex-direction:column; gap:12px; }
  .office-item { border-radius:var(--radius); border:1.5px solid var(--border); overflow:hidden; }
  .office-header { padding:14px 20px; display:flex; align-items:center; gap:12px; cursor:pointer; background:#fff; transition:background .2s; }
  .office-header:hover { background:var(--cream); }
  .office-status-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .dot-approved { background:var(--success); } .dot-rejected { background:var(--danger); }
  .dot-submitted { background:var(--warn); } .dot-not-started { background:#d1d5db; }
  .office-body { padding:20px; background:#fafafa; border-top:1px solid var(--border); }

  /* STEP ITEMS */
  .step-list { display:flex; flex-direction:column; gap:10px; }
  .step-item { display:flex; align-items:center; gap:12px; padding:12px 16px; border-radius:8px; border:1px solid var(--border); background:#fff; }
  .step-num { width:28px; height:28px; border-radius:50%; background:var(--navy); color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; flex-shrink:0; }
  .step-info { flex:1; }
  .step-title { font-size:13px; font-weight:500; }
  .step-desc { font-size:12px; color:var(--muted); }
  .step-action { flex-shrink:0; }
  .file-preview { width:80px; height:60px; border-radius:6px; object-fit:cover; border:1px solid var(--border); }

  /* CLEARANCE CERT */
  .cert { background:#fff; padding:40px; border:3px double var(--navy); border-radius:4px; max-width:800px; margin:0 auto; }
  .cert-header { text-align:center; border-bottom:2px solid var(--navy); padding-bottom:16px; margin-bottom:24px; }
  .cert-school { font-size:20px; font-weight:700; color:var(--navy); }
  .cert-title { font-size:28px; color:var(--gold); margin:8px 0 4px; }
  .cert-subtitle { font-size:13px; color:var(--muted); }
  .cert-table { width:100%; border-collapse:collapse; margin:24px 0; }
  .cert-table th, .cert-table td { border:1px solid var(--border); padding:12px 16px; font-size:13px; text-align:left; }
  .cert-table th { background:var(--navy); color:#fff; font-weight:500; }
  .cert-table td { background:#fff; }
  .cert-stamp { display:inline-block; border:3px solid var(--success); border-radius:4px; padding:4px 12px; color:var(--success); font-size:12px; font-weight:700; letter-spacing:2px; transform:rotate(-5deg); }
  .cert-sig { display:grid; grid-template-columns:1fr 1fr; gap:40px; margin-top:40px; }
  .cert-sig-line { border-top:1.5px solid var(--text); padding-top:8px; text-align:center; font-size:12px; color:var(--muted); }

  /* ---- ADMIN ---- */
  .stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:16px; margin-bottom:24px; }
  .stat-card { background:#fff; border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); border-left:4px solid var(--navy); }
  .stat-num { font-size:32px; font-weight:700; color:var(--navy); }
  .stat-label { font-size:13px; color:var(--muted); margin-top:4px; }

  /* TABLE */
  .table-wrap { overflow-x:auto; }
  table.data-table { width:100%; border-collapse:collapse; font-size:14px; }
  .data-table th { background:var(--navy); color:#fff; padding:12px 16px; text-align:left; font-weight:500; font-size:13px; }
  .data-table td { padding:12px 16px; border-bottom:1px solid var(--border); }
  .data-table tr:hover td { background:var(--cream); }

  /* MODAL */
  .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,.5); overflow-y:auto; z-index:1000; }
  .modal { background:#fff; border-radius:var(--radius-lg); padding:36px 40px; width:100%; max-width:560px; position:relative; margin:32px auto 48px; }
  .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; }
  .modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:var(--muted); }

  /* TABS */
  .tabs { display:flex; gap:4px; margin-bottom:24px; background:var(--cream); border-radius:10px; padding:4px; }
  .tab { flex:1; padding:8px 16px; border:none; background:none; border-radius:8px; font-size:14px; font-weight:500; cursor:pointer; transition:all .2s; color:var(--muted); }
  .tab.active { background:#fff; color:var(--navy); box-shadow:0 2px 8px rgba(0,0,0,.08); }

  /* NOTIFICATION PANEL */
  .notif-panel { position:absolute; right:0; top:110%; background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); width:320px; z-index:200; border:1px solid var(--border); }
  .notif-item { padding:12px 16px; border-bottom:1px solid var(--border); font-size:13px; color:var(--text); }
  .notif-item.unread { background:#f0f4ff; }
  .notif-time { font-size:11px; color:var(--muted); margin-top:4px; }

  /* PROGRESS BAR */
  .progress-track { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--navy),var(--gold)); transition:width .5s ease; }

  /* ROLE CARDS */
  .role-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
  .role-card { background:#fff; border-radius:var(--radius-lg); padding:32px 24px; text-align:center; cursor:pointer; border:2px solid var(--border); transition:all .25s; }
  .role-card:hover { border-color:var(--navy); transform:translateY(-4px); box-shadow:var(--shadow); }
  .role-icon { font-size:48px; margin-bottom:16px; }

  /* FILE UPLOAD ZONE */
  .upload-zone { border:2px dashed var(--border); border-radius:8px; padding:24px; text-align:center; cursor:pointer; transition:border-color .2s; background:#fafafa; }
  .upload-zone:hover { border-color:var(--navy); }
  .upload-zone.has-file { border-color:var(--success); background:var(--success-bg); }

  /* TOOLTIP */
  .tooltip { position:relative; display:inline-block; }
  .tooltip-text { visibility:hidden; background:var(--navy); color:#fff; padding:4px 8px; border-radius:4px; font-size:12px; position:absolute; bottom:100%; left:50%; transform:translateX(-50%); white-space:nowrap; }
  .tooltip:hover .tooltip-text { visibility:visible; }

  @media(max-width:768px) {
    .ai-photos { grid-template-columns:1fr; padding:32px 20px; }
    .role-cards { grid-template-columns:1fr; }
    .form-row { grid-template-columns:1fr; }
    .main-content { padding:16px; }
    .sidebar { display:none; }
    .hero { padding:48px 20px 40px; }
  }

  @media print {
    body { background:#fff; }
    .no-print { display:none !important; }
    .cert { box-shadow:none; border:3px double var(--navy); }
    @page {
      size: 8.5in 11in portrait;
      margin: 0.5in;
    }
    #ascot-cert {
      max-width: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      border: 2px solid #c9a84c !important;
      font-size: 11px !important;
    }
    .fade-up, .main-content, .layout, .sidebar, .nav { display: block !important; }
    .nav, .sidebar, .no-print { display: none !important; }
    .main-content { padding: 0 !important; }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
  // Disable right-click context menu
  document.addEventListener('contextmenu', e => e.preventDefault());
  // Disable F12, Ctrl+U, Ctrl+Shift+I/J/C, Ctrl+S
  document.addEventListener('keydown', e => {
    if (e.key === 'F12') { e.preventDefault(); return false; }
    if (e.ctrlKey && ['u','U','s','S'].includes(e.key)) { e.preventDefault(); return false; }
    if (e.ctrlKey && e.shiftKey && ['i','I','j','J','c','C'].includes(e.key)) { e.preventDefault(); return false; }
  });
</script>

const createUserModel = (o={}) => ({
  id:'',firstName:'',lastName:'',middleName:'',email:'',password:'',
  role:ROLES.STUDENT,studentId:'',course:'',yearLevel:'',section:'',
  department:'',address:'',contactNumber:'',facultyType:null,
  adviserName:'',deanDepartment:'',handledSections:[],status:'pending',rejectionNote:'',
  createdAt:new Date().toISOString(),...o
});

const createOfficeReq = (officeId,canProceed=false) => ({
  officeId,status:'not_started',submittedAt:null,reviewedAt:null,
  reviewerNote:'',steps:{},canProceed
});

const createClearanceModel = (studentId,o={}) => ({
  id:'CLR-'+Date.now(),studentId,purpose:'',purposeDetail:'',
  offices:{
    dean:createOfficeReq('dean',true),
    adviser:createOfficeReq('adviser'),
    guidance:createOfficeReq('guidance'),
    library:createOfficeReq('library'),
    treasurer:createOfficeReq('treasurer'),
  },
  overallStatus:'in_progress',createdAt:new Date().toISOString(),completedAt:null,...o
});

class AppStore {
  constructor() {
    this.users=[]; this.clearances={}; this.notifications={}; this._listeners=new Set();
    this._load();
  }
  _defaultAdmins(){
    const mkUser=(o)=>({...createUserModel(),id:'',firstName:'',lastName:'',email:'',password:'',status:'accepted',...o});
    return [
      mkUser({id:'admin-001',firstName:'Super',lastName:'Admin',email:'admin@school.edu',password:'Admin@123',role:ROLES.ADMIN}),
      mkUser({id:'admin-002',firstName:'System',lastName:'Admin',email:'admin2@school.edu',password:'Admin@456',role:ROLES.ADMIN}),
    ];
  }
  _load(){
    try{
      const saved=localStorage.getItem('clearsync_db');
      if(saved){
        const db=JSON.parse(saved);
        this.users=db.users||this._defaultAdmins();
        this.clearances=db.clearances||{};
        this.notifications=db.notifications||{};
        // ensure default admins always exist
        const adminIds=['admin-001','admin-002'];
        this._defaultAdmins().forEach(a=>{
          if(!this.users.find(u=>u.id===a.id))this.users.push(a);
        });
      } else {
        this.users=this._defaultAdmins();
        this.clearances={};
        this.notifications={};
        this._save();
      }
    }catch(e){
      this.users=this._defaultAdmins();
      this.clearances={};
      this.notifications={};
    }
  }
  _save(){
    try{
      localStorage.setItem('clearsync_db',JSON.stringify({
        users:this.users,
        clearances:this.clearances,
        notifications:this.notifications,
        savedAt:new Date().toISOString()
      }));
    }catch(e){console.warn('Storage save failed',e);}
  }
  sub(fn){this._listeners.add(fn);return()=>this._listeners.delete(fn);}
  _emit(){this._listeners.forEach(fn=>fn());}
  _notify_store(uid,msg){if(!this.notifications[uid])this.notifications[uid]=[];this.notifications[uid].unshift({id:Date.now(),message:msg,read:false,createdAt:new Date().toISOString()});}
  getUser(id){return this.users.find(u=>u.id===id);}
  getByEmail(e){return this.users.find(u=>u.email===e);}
  getPending(){return this.users.filter(u=>u.status==='pending');}
  getStudents(){return this.users.filter(u=>u.role===ROLES.STUDENT);}
  getFaculty(){return this.users.filter(u=>u.role===ROLES.FACULTY);}
  getAdvisers(){return this.getFaculty().filter(f=>f.facultyType==='adviser');}
  getDeans(){return this.getFaculty().filter(f=>f.facultyType==='dean');}
  register(data){
    if(this.getByEmail(data.email))return{success:false,error:'Email already registered.'};
    const user={...createUserModel(),...data,id:data.role+'-'+Date.now(),status:'pending',createdAt:new Date().toISOString()};
    this.users.push(user);
    const admins=this.users.filter(u=>u.role===ROLES.ADMIN);
    admins.forEach(a=>this._notify_store(a.id,`New registration request: ${data.firstName} ${data.lastName} (${data.role})`));
    this._save();this._emit();return{success:true,user};
  }
  registerFaculty(data){
    if(this.getByEmail(data.email))return{success:false,error:'Email already registered.'};
    const user={...createUserModel(),...data,id:'fac-'+Date.now(),status:'accepted',createdAt:new Date().toISOString()};
    this.users.push(user);
    this._save();this._emit();return{success:true,user};
  }
  deleteFaculty(uid){
    this.users=this.users.filter(u=>u.id!==uid);
    this._save();this._emit();
  }
  updateStatus(uid,status,note=''){
    const u=this.users.find(u=>u.id===uid);if(!u)return false;
    u.status=status;u.rejectionNote=note;
    this._notify_store(uid,status==='accepted'?'Your account has been approved! You can now log in.':`Your account was rejected. Reason: ${note||'Please contact admin.'}`);
    this._save();this._emit();return true;
  }
  login(email,password){
    const u=this.getByEmail(email);
    if(!u)return{success:false,error:'Email not found.'};
    if(u.password!==password)return{success:false,error:'Incorrect password.'};
    if(u.status==='pending')return{success:false,error:'Your account is pending admin approval.'};
    if(u.status==='rejected')return{success:false,error:`Account rejected. ${u.rejectionNote?'Reason: '+u.rejectionNote:'Please contact admin.'}`};
    return{success:true,user:u};
  }
  getClearance(sid){return this.clearances[sid]||null;}
  initClearance(sid,purpose,detail){
    const r=createClearanceModel(sid,{purpose,purposeDetail:detail});
    this.clearances[sid]=r;this._save();this._emit();return r;
  }
  submitOffice(sid,officeId,steps){
    const r=this.clearances[sid];if(!r)return false;
    const o=r.offices[officeId];if(!o||!o.canProceed)return false;
    o.status='submitted';o.submittedAt=new Date().toISOString();o.steps={...steps};
    const stu=this.getUser(sid);
    if(officeId==='dean'){
      this.getDeans().filter(d=>d.deanDepartment===stu?.department).forEach(d=>this._notify_store(d.id,`New clearance request from ${stu?.firstName} ${stu?.lastName} (${stu?.department}).`));
    } else if(officeId==='adviser'){
      this.getAdvisers().filter(a=>a.handledSections&&a.handledSections.some(sec=>sec.toLowerCase()===(stu?.section||'').toLowerCase())).forEach(a=>this._notify_store(a.id,`New adviser clearance request from ${stu?.firstName} ${stu?.lastName} (${stu?.section}).`));
    } else {
      this.getFaculty().filter(f=>f.facultyType===officeId).forEach(f=>this._notify_store(f.id,`New request from ${stu?.firstName} ${stu?.lastName}.`));
    }
    this._save();this._emit();return true;
  }
  reviewOffice(sid,officeId,approved,note){
    const r=this.clearances[sid];if(!r)return false;
    const o=r.offices[officeId];if(!o)return false;
    o.status=approved?'approved':'rejected';o.reviewerNote=note;o.reviewedAt=new Date().toISOString();
    if(approved){
      const idx=OFFICE_ORDER.indexOf(officeId);
      if(idx>=0&&idx<OFFICE_ORDER.length-1)r.offices[OFFICE_ORDER[idx+1]].canProceed=true;
      if(OFFICE_ORDER.every(id=>r.offices[id].status==='approved')){r.overallStatus='completed';r.completedAt=new Date().toISOString();}
    }
    const stu=this.getUser(sid);
    this._notify_store(sid,`Your ${OFFICES_CONFIG[officeId].label} request was ${approved?'✅ approved':'❌ rejected'}.${note?' Note: '+note:''}`);
    this._save();this._emit();return true;
  }
  getRequests(facultyType,deptFilter=null,sectionFilter=null){
    return Object.values(this.clearances).filter(r=>{
      const o=r.offices[facultyType];
      if(!o||o.status==='not_started')return false;
      const stu=this.getUser(r.studentId);
      if(facultyType==='dean'&&deptFilter){return stu?.department===deptFilter;}
      if(facultyType==='adviser'&&sectionFilter&&sectionFilter.length>0){
        return sectionFilter.some(sec=>stu?.section?.toLowerCase()===sec.toLowerCase());
      }
      return true;
    }).map(r=>({...r,student:this.getUser(r.studentId)}));
  }
  getNotifs(uid){return this.notifications[uid]||[];}
  markRead(uid){(this.notifications[uid]||[]).forEach(n=>n.read=true);this._save();this._emit();}
  unreadCount(uid){return(this.notifications[uid]||[]).filter(n=>!n.read).length;}
}

function useStore() {
  const [tick,setTick]=useState(0);
  useEffect(()=>{
    const unsub=store.sub(()=>setTick(t=>t+1));
    return unsub;
  },[]);
  return tick;
}

function Notif({userId}){
  useStore();
  const [open,setOpen]=useState(false);
  const ref=useRef();
  const notifs=store.getNotifs(userId);
  const unread=store.unreadCount(userId);
  useEffect(()=>{
    const fn=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(false);};
    document.addEventListener('mousedown',fn);return()=>document.removeEventListener('mousedown',fn);
  },[]);
  return <div className="nav-notif tooltip" ref={ref} style={{position:'relative'}}>
    <button style={{background:'none',border:'none',color:'#fff',fontSize:20,cursor:'pointer',position:'relative'}} onClick={()=>{setOpen(o=>!o);if(!open)store.markRead(userId);}}>
      🔔{unread>0&&<span className="notif-badge">{unread}</span>}
    </button>
    {open&&<div className="notif-panel" style={{width:360}}>
      <div style={{padding:'14px 16px',borderBottom:'1px solid var(--border)',fontWeight:600,fontSize:14,color:'var(--navy)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>

      </div>
      {notifs.length===0
        ?<div style={{padding:24,fontSize:13,color:'var(--muted)',textAlign:'center'}}>No notifications yet.</div>
        :notifs.slice(0,10).map(n=><div key={n.id} className={`notif-item${n.read?'':' unread'}`}>

function AuthForm({role,facultyType,onSuccess,onBack}){
  useStore();
  const [mode,setMode]=useState('login');
  const [form,setForm]=useState({firstName:'',lastName:'',middleName:'',email:'',password:'',confirmPassword:'',studentId:'',course:'',yearLevel:'',section:'',department:'',address:'',contactNumber:'',adviserName:'',deanDepartment:'',province:'',municipality:'',barangay:''});
  const [error,setError]=useState('');
  const [loading,setLoading]=useState(false);
  const [success,setSuccess]=useState('');
  const [showPw,setShowPw]=useState(false);
  const [showConfirmPw,setShowConfirmPw]=useState(false);
  const [showLoginPw,setShowLoginPw]=useState(false);
  const [provinces,setProvinces]=useState([]);
  const [municipalities,setMunicipalities]=useState([]);
  const [barangays,setBarangays]=useState([]);
  const [provCode,setProvCode]=useState('');
  const [muniCode,setMuniCode]=useState('');

  const PSGC='https://psgc.gitlab.io/api';

  const {useEffect}=React;

  useEffect(()=>{
    if(mode==='register'&&role===ROLES.STUDENT){
      fetch(`${PSGC}/provinces/`)
        .then(r=>r.json())
        .then(d=>setProvinces(d.sort((a,b)=>a.name.localeCompare(b.name))))
        .catch(()=>{});
    }
  },[mode]);

  const handleProvChange=(e)=>{
    const code=e.target.value;
    const name=provinces.find(p=>p.code===code)?.name||'';
    setProvCode(code);
    setMuniCode('');
    setMunicipalities([]);
    setBarangays([]);
    set('province',name);
    set('municipality','');
    set('barangay','');
    if(code){
      fetch(`${PSGC}/provinces/${code}/cities-municipalities/`)
        .then(r=>r.json())
        .then(d=>setMunicipalities(d.sort((a,b)=>a.name.localeCompare(b.name))))
        .catch(()=>{});
    }
  };

  const handleMuniChange=(e)=>{
    const code=e.target.value;
    const name=municipalities.find(m=>m.code===code)?.name||'';
    setMuniCode(code);
    setBarangays([]);
    set('municipality',name);
    set('barangay','');
    if(code){
      fetch(`${PSGC}/cities-municipalities/${code}/barangays/`)
        .then(r=>r.json())
        .then(d=>setBarangays(d.sort((a,b)=>a.name.localeCompare(b.name))))
        .catch(()=>{});
    }
  };

  const handleBrgyChange=(e)=>{
    const name=barangays.find(b=>b.code===e.target.value)?.name||'';
    set('barangay',name);
  };

  const handleCpChange=(e)=>{
    let v=e.target.value.replace(/\D/g,'');
    if(v.length>0&&!v.startsWith('09'))v='09'+v.replace(/^0*/,'');
    if(v.length>11)v=v.slice(0,11);
    set('contactNumber',v);
  };

  const handleStudentIdChange=(e)=>{
    let v=e.target.value.replace(/[^0-9-]/g,'');
    // Format: 00-00-0000
    const digits=v.replace(/-/g,'');
    let formatted='';
    if(digits.length<=2)formatted=digits;
    else if(digits.length<=4)formatted=digits.slice(0,2)+'-'+digits.slice(2);
    else formatted=digits.slice(0,2)+'-'+digits.slice(2,4)+'-'+digits.slice(4,8);
    set('studentId',formatted);
  };

  const getPwStrength=(pw)=>{
    if(!pw)return{score:0,label:'',color:''};
    let score=0;
    if(pw.length>=8)score++;
    if(pw.length>=12)score++;
    if(/[A-Z]/.test(pw))score++;
    if(/[0-9]/.test(pw))score++;
    if(/[^A-Za-z0-9]/.test(pw))score++;
    if(score<=1)return{score,label:'Weak',color:'#dc2626'};
    if(score<=2)return{score,label:'Fair',color:'#d97706'};
    if(score<=3)return{score,label:'Good',color:'#2563eb'};
    return{score,label:'Strong',color:'#16a34a'};
  };

  const pwStrength=getPwStrength(form.password);

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const handleLogin=()=>{
    setError('');setLoading(true);
    setTimeout(()=>{
      const r=store.login(form.email,form.password);
      setLoading(false);
      if(r.success){
        if(r.user.role!==role){setError(`This account is not a ${role} account.`);return;}
        if(role===ROLES.FACULTY&&facultyType&&r.user.facultyType!==facultyType){setError(`This account is not registered as ${facultyType}.`);return;}
        onSuccess(r.user);
      } else setError(r.error);
    },600);
  };

  const handleRegister=()=>{
    setError('');
    if(!form.firstName||!form.lastName||!form.email||!form.password)return setError('Please fill all required fields.');
    if(form.password!==form.confirmPassword)return setError('Passwords do not match.');
    if(form.password.length<6)return setError('Password must be at least 6 characters.');
    if(role===ROLES.STUDENT&&!form.studentId)return setError('Student ID is required.');
    if(role===ROLES.STUDENT&&form.contactNumber&&form.contactNumber.length!==11)return setError('Contact number must be 11 digits starting with 09.');
    const fullAddress=[form.barangay,form.municipality,form.province].filter(Boolean).join(', ');
    const submitForm={...form,address:fullAddress||form.address};
    setLoading(true);
    setTimeout(()=>{
      const r=store.register({...submitForm,role,facultyType:role===ROLES.FACULTY?facultyType:null});
      setLoading(false);
      if(r.success)setSuccess(role===ROLES.ADMIN?'Admin account created! You may log in.':'Registration submitted! Please wait for admin approval.');
      else setError(r.error);
    },600);
  };

  const canRegister = role !== ROLES.FACULTY;

  const EyeIcon=({show,onToggle})=><button type="button" onClick={onToggle} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--muted)',padding:0,display:'flex',alignItems:'center'}}>
    {show
      ? <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      : <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
    }
  </button>;

  if(success)return <div className="auth-container"><div className="auth-card">
    <div style={{textAlign:'center'}}>
      <div style={{fontSize:64,marginBottom:16}}>✅</div>
      <h2 style={{color:'var(--navy)',marginBottom:12}}>Registration Submitted!</h2>
      <p style={{color:'var(--muted)',fontSize:14,marginBottom:24}}>{success}</p>
      <button className="btn btn-primary" onClick={()=>{setSuccess('');setMode('login');}}>Go to Login</button>
    </div>
  </div></div>;

  return <div className="auth-container"><div className="auth-card fade-in">
    <div className="auth-logo">
      <div style={{marginBottom:8}}><img src={ASCOT_LOGO} alt="ASCOT" style={{width:56,height:56,objectFit:'contain'}}/></div>
      <h1>ClearanceSync</h1>
      <p>{role==='student'?'Student Portal':role==='admin'?'Admin Portal':'Faculty Portal'}{facultyType?' — '+facultyType.charAt(0).toUpperCase()+facultyType.slice(1):''}</p>
    </div>

    {canRegister&&<div className="tabs">
      <button className={`tab${mode==='login'?' active':''}`} onClick={()=>setMode('login')}>Login</button>
      <button className={`tab${mode==='register'?' active':''}`} onClick={()=>setMode('register')}>Create Account</button>
    </div>}

    {error&&<div style={{background:'var(--danger-bg)',color:'var(--danger)',padding:'10px 14px',borderRadius:8,fontSize:13,marginBottom:16}}>{error}</div>}

    {mode==='login'?<>
      <div className="form-group"><label>Email Address *</label><input type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="your@email.com"/></div>
      <div className="form-group">
        <label>Password *</label>
        <div style={{position:'relative'}}>
          <input type={showLoginPw?'text':'password'} value={form.password} onChange={e=>set('password',e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==='Enter'&&handleLogin()} style={{paddingRight:38}}/>
          <EyeIcon show={showLoginPw} onToggle={()=>setShowLoginPw(s=>!s)}/>
        </div>
      </div>
      {role==='faculty'&&<div style={{background:'var(--info-bg)',color:'var(--info)',padding:'10px 14px',borderRadius:8,fontSize:12,marginBottom:16}}>
        ℹ️ Faculty accounts are created by the administrator. Use the email and password assigned to you.
      </div>}
      <button className="btn btn-primary" style={{width:'100%',padding:13,fontSize:15}} onClick={handleLogin} disabled={loading}>
        {loading?'Signing in...':'Sign In →'}
      </button>
    </>:<>
      <div className="form-row">
        <div className="form-group"><label>First Name *</label><input value={form.firstName} onChange={e=>set('firstName',e.target.value)} placeholder="Juan"/></div>
        <div className="form-group"><label>Last Name *</label><input value={form.lastName} onChange={e=>set('lastName',e.target.value)} placeholder="dela Cruz"/></div>
      </div>
      <div className="form-group">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
          <label style={{margin:0}}>Middle Name</label>
          <label style={{display:'flex',alignItems:'center',gap:6,fontSize:13,color:'var(--muted)',cursor:'pointer',fontWeight:400}}>
            <input type="checkbox" checked={form.middleName==='N/A'} onChange={e=>set('middleName',e.target.checked?'N/A':'')} style={{width:15,height:15,accentColor:'var(--navy)',cursor:'pointer'}}/>
            No Middle Name
          </label>
        </div>
        <input value={form.middleName==='N/A'?'':form.middleName} onChange={e=>set('middleName',e.target.value)} placeholder="Santos" disabled={form.middleName==='N/A'} style={{background:form.middleName==='N/A'?'#f3f4f6':'',color:form.middleName==='N/A'?'var(--muted)':''}}/>
        {form.middleName==='N/A'&&<div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>✓ Marked as no middle name</div>}
      </div>
      <div className="form-group"><label>Email Address *</label><input type="email" value={form.email} onChange={e=>set('email',e.target.value)} placeholder="your@email.com"/></div>
      {role===ROLES.STUDENT&&<>
        <div className="form-row">
          <div className="form-group">
            <label>Student ID *</label>
            <input value={form.studentId} onChange={handleStudentIdChange} placeholder="00-00-0000" maxLength={10}/>
          </div>
          <div className="form-group"><label>Year Level *</label><select value={form.yearLevel} onChange={e=>set('yearLevel',e.target.value)}><option value="">Select</option>{['1st Year','2nd Year','3rd Year','4th Year','5th Year','Graduate'].map(y=><option key={y}>{y}</option>)}</select></div>
        </div>
        <div className="form-row">
          <div className="form-group"><label>Course *</label><input value={form.course} onChange={e=>set('course',e.target.value)} placeholder="BS Information Technology"/></div>
          <div className="form-group"><label>Section</label><input value={form.section} onChange={e=>set('section',e.target.value)} placeholder="BSIT-4A"/></div>
        </div>
        <div className="form-group"><label>Department *</label><select value={form.department} onChange={e=>set('department',e.target.value)}><option value="">Select Department</option>{DEPARTMENTS.map(d=><option key={d}>{d}</option>)}</select></div>
        <div className="form-group">
          <label>Contact Number <span style={{fontSize:11,color:'var(--muted)'}}>(11 digits, starts with 09)</span></label>
          <input value={form.contactNumber} onChange={handleCpChange} placeholder="09XXXXXXXXX" maxLength={11} inputMode="numeric"/>
          {form.contactNumber&&<div style={{fontSize:11,marginTop:4,color:form.contactNumber.length===11?'var(--success)':'var(--warn)'}}>
            {form.contactNumber.length}/11 {form.contactNumber.length===11?'✓':'digits'}
          </div>}
        </div>
        <div className="form-group">
          <label>Province</label>
          <select onChange={handleProvChange} value={provCode}>
            <option value="">— Select Province —</option>
            {provinces.map(p=><option key={p.code} value={p.code}>{p.name}</option>)}
          </select>
          {provinces.length===0&&provCode===''&&<div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Loading provinces...</div>}
        </div>
        <div className="form-group">
          <label>Municipality / City</label>
          <select onChange={handleMuniChange} value={muniCode} disabled={!provCode}>
            <option value="">— Select Municipality —</option>
            {municipalities.map(m=><option key={m.code} value={m.code}>{m.name}</option>)}
          </select>
        </div>
        <div className="form-group">
          <label>Barangay</label>
          <select onChange={handleBrgyChange} disabled={!muniCode}>
            <option value="">— Select Barangay —</option>
            {barangays.map(b=><option key={b.code} value={b.code}>{b.name}</option>)}
          </select>
        </div>
      </>}
      <div className="form-group">
        <label>Password *</label>
        <div style={{position:'relative'}}>
          <input type={showPw?'text':'password'} value={form.password} onChange={e=>set('password',e.target.value)} placeholder="Min 6 characters" style={{paddingRight:38}}/>
          <EyeIcon show={showPw} onToggle={()=>setShowPw(s=>!s)}/>
        </div>
        {form.password&&<>
          <div style={{display:'flex',gap:4,marginTop:6}}>
            {[1,2,3,4].map(i=><div key={i} style={{flex:1,height:4,borderRadius:2,background:pwStrength.score>=i?pwStrength.color:'#e5e7eb',transition:'background .3s'}}/>)}
          </div>
          <div style={{fontSize:11,marginTop:4,color:pwStrength.color,fontWeight:600}}>{pwStrength.label}
            <span style={{color:'var(--muted)',fontWeight:400,marginLeft:8}}>
              {pwStrength.score<3&&'Add uppercase, numbers or symbols to strengthen'}
            </span>
          </div>
        </>}
      </div>
      <div className="form-group">
        <label>Confirm Password *</label>
        <div style={{position:'relative'}}>
          <input type={showConfirmPw?'text':'password'} value={form.confirmPassword} onChange={e=>set('confirmPassword',e.target.value)} placeholder="Repeat password" style={{paddingRight:38}}/>
          <EyeIcon show={showConfirmPw} onToggle={()=>setShowConfirmPw(s=>!s)}/>
        </div>
        {form.confirmPassword&&<div style={{fontSize:11,marginTop:4,color:form.password===form.confirmPassword?'var(--success)':'var(--danger)'}}>
          {form.password===form.confirmPassword?'✓ Passwords match':'✗ Passwords do not match'}
        </div>}
      </div>
      <button className="btn btn-gold" style={{width:'100%',padding:13,fontSize:15}} onClick={handleRegister} disabled={loading}>
        {loading?'Submitting...':'Submit Registration →'}
      </button>
    </>}

    <div style={{textAlign:'center',marginTop:20}}>
      <button style={{background:'none',border:'none',color:'var(--muted)',fontSize:13,cursor:'pointer'}} onClick={onBack}>← Back to role selection</button>
    </div>
  </div></div>;
}

function StudentDashboard({user,onLogout}){
  useStore();
  const [page,setPage]=useState('overview');
  const [selectedOffice,setSelectedOffice]=useState(null);
  const clearance=store.getClearance(user.id);

  const progressCount=clearance?OFFICE_ORDER.filter(id=>clearance.offices[id].status==='approved').length:0;
  const progressPct=Math.round((progressCount/5)*100);

  return <>
    <Navbar user={user} onLogout={onLogout}/>
    <div className="layout">
      <aside className="sidebar">
        <ul className="sidebar-menu">
          {[{id:'overview',icon:'🏠',label:'Overview'},{id:'clearance',icon:'📋',label:'Clearance Tracker'},{id:'certificate',icon:'🏆',label:'Certificate'}].map(m=><li key={m.id} className={`sidebar-item${page===m.id?' active':''}`} onClick={()=>setPage(m.id)}>
            <span>{m.icon}</span><span>{m.label}</span>
          </li>)}
        </ul>
      </aside>
      <main className="main-content">
        {page==='overview'&&<StudentOverview user={user} clearance={clearance} progressCount={progressCount} progressPct={progressPct} onGoClearance={()=>setPage('clearance')}/>}
        {page==='clearance'&&<ClearanceTracker user={user} clearance={clearance} selectedOffice={selectedOffice} setSelectedOffice={setSelectedOffice}/>}
        {page==='certificate'&&<ClearanceCertificate user={user} clearance={clearance}/>}
      </main>
    </div>
  </>;
}

function StudentOverview({user,clearance,progressCount,progressPct,onGoClearance}){
  return <div className="fade-up">
    <div style={{marginBottom:32}}>
      <h1 style={{fontSize:28,color:'var(--navy)'}}>Welcome back, {user.firstName}! 👋</h1>
      <p style={{color:'var(--muted)',marginTop:4}}>Track and manage your clearance requirements below.</p>
    </div>

    <div className="stats-row">
      {[{num:progressCount,label:'Offices Cleared',border:'var(--success)'},{num:5-progressCount,label:'Offices Remaining',border:'var(--warn)'},{num:clearance?OFFICE_ORDER.filter(id=>clearance.offices[id].status==='submitted').length:0,label:'Pending Review',border:'var(--info)'},{num:clearance?OFFICE_ORDER.filter(id=>clearance.offices[id].status==='rejected').length:0,label:'Rejected / Fix',border:'var(--danger)'}].map((s,i)=><div key={i} className="stat-card" style={{borderLeftColor:s.border}}>
        <div className="stat-num">{s.num}</div>
        <div className="stat-label">{s.label}</div>
      </div>)}
    </div>

    <div className="card" style={{marginBottom:24}}>
      <h3 style={{fontSize:16,color:'var(--navy)',marginBottom:16}}>Clearance Progress</h3>
      <div className="progress-track"><div className="progress-fill" style={{width:progressPct+'%'}}/></div>
      <div style={{display:'flex',justifyContent:'space-between',marginTop:8,fontSize:13,color:'var(--muted)'}}>
        <span>{progressCount} of 5 offices cleared</span><span>{progressPct}%</span>
      </div>
    </div>

    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:24}}>
      <div className="card">
        <h3 style={{fontSize:16,color:'var(--navy)',marginBottom:16}}>Student Information</h3>
        {[['Student ID',user.studentId],['Full Name',`${user.lastName}, ${user.firstName} ${user.middleName||''}`],['Course',user.course],['Year & Section',`${user.yearLevel} — ${user.section}`],['Department',user.department],['Contact',user.contactNumber],['Address',user.address]].map(([k,v])=>v?<div key={k} style={{display:'flex',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid var(--border)',fontSize:14}}>
          <span style={{color:'var(--muted)',fontWeight:500}}>{k}</span><span style={{textAlign:'right',maxWidth:'55%'}}>{v}</span>
        </div>:null)}
      </div>
      <div className="card">
        <h3 style={{fontSize:16,color:'var(--navy)',marginBottom:16}}>Office Status Summary</h3>
        {OFFICE_ORDER.map(id=>{
          const cfg=OFFICES_CONFIG[id];
          const off=clearance?.offices[id];
          return <div key={id} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--border)'}}>
            <span style={{fontSize:20}}>{cfg.icon}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:500}}>{cfg.label}</div>
            </div>
            <StatusBadge status={off?.status||'not_started'}/>
          </div>;
        })}
        <button className="btn btn-primary" style={{width:'100%',marginTop:16}} onClick={onGoClearance}>Go to Clearance Tracker →</button>
      </div>
    </div>
  </div>;
}

function ClearanceTracker({user,clearance,selectedOffice,setSelectedOffice}){
  useStore();
  const [initForm,setInitForm]=useState({purpose:'',purposeDetail:''});
  const [showInit,setShowInit]=useState(!clearance);
  const [submitModal,setSubmitModal]=useState(null);
  const [steps,setSteps]=useState({});
  const [questAnswers,setQuestAnswers]=useState({});
  const [reviewNote,setReviewNote]=useState(null);

  const handleInitClearance=()=>{
    if(!initForm.purpose)return;
    const detail=initForm.purpose==='Others'?initForm.purposeDetail:'';
    store.initClearance(user.id,initForm.purpose,detail);
    setShowInit(false);
  };

  const handleOpenSubmit=(officeId)=>{
    const off=clearance?.offices[officeId];
    if(!off||!off.canProceed)return;
    setSteps({});setQuestAnswers({});
    setSubmitModal(officeId);
  };

  const handleSubmit=()=>{
    if(!submitModal)return;
    const cfg=OFFICES_CONFIG[submitModal];
    // Validate all steps filled
    for(const step of cfg.steps){
      if(step.type==='file'&&!steps[step.id])return alert('Please upload all required documents.');
      if(step.type==='questionnaire'){
        for(const q of step.questions){
          if(!questAnswers[q.id])return alert('Please answer all questionnaire items.');
        }
      }
    }
    const allSteps={...steps};
    const questStepId=cfg.steps.find(s=>s.type==='questionnaire')?.id;
    if(questStepId)allSteps[questStepId]={type:'questionnaire',answers:questAnswers,submittedAt:new Date().toISOString()};
    store.submitOffice(user.id,submitModal,allSteps);
    setSubmitModal(null);
  };

  const CLEARANCE_REASON_CARDS = [
    {
      purpose: 'Graduation',
      label: 'Graduate',
      desc: 'Graduating students applying for clearance',
      icon: '🎓',
      color: '#0f1f3d',
      border: '#c9a84c',
    },
    {
      purpose: 'Undergraduate',
      label: 'Undergraduate',
      desc: 'Current undergraduate students needing clearance',
      icon: '📚',
      color: '#1a3260',
      border: '#c9a84c',
    },
    {
      purpose: 'Transferring',
      label: 'Transferring',
      desc: 'Students transferring to another institution',
      icon: '🔄',
      color: '#2d4a8a',
      border: '#c9a84c',
    },
  ];

  const OFFICES_LIST = [
    {icon:'🎓', label:'Department Dean'},
    {icon:'👨‍🏫', label:'Adviser / Area Chairman'},
    {icon:'📚', label:'Library'},
    {icon:'🧭', label:'Office of Student Affairs (OSA)'},
    {icon:'💰', label:"Treasurer's Office"},
  ];

  if(showInit||!clearance)return <div className="fade-up" style={{minHeight:'80vh',display:'flex',flexDirection:'column',justifyContent:'flex-start',padding:'40px 0 40px 0'}}>
    <h2 style={{fontSize:30,color:'var(--navy)',marginBottom:6,fontFamily:'Playfair Display, serif'}}>What is your reason for clearance?</h2>
    <p style={{color:'var(--muted)',marginBottom:36,fontSize:15}}>Select the option that applies to you to begin the process.</p>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:28,width:'100%'}}>
      {CLEARANCE_REASON_CARDS.map((card,i)=>(
        <div key={card.purpose}
          onClick={()=>{setInitForm(f=>({...f,purpose:card.purpose}));}}
          style={{
            background: card.color,
            borderRadius:20,
            border: initForm.purpose===card.purpose ? `2.5px solid ${card.border}` : '2.5px solid transparent',
            boxShadow: initForm.purpose===card.purpose ? `0 0 0 3px ${card.border},0 8px 32px rgba(15,31,61,0.28)` : '0 6px 28px rgba(15,31,61,0.22)',
            padding:'36px 28px 28px',
            cursor:'pointer',
            transition:'all .22s',
            transform: initForm.purpose===card.purpose ? 'translateY(-6px) scale(1.01)' : 'none',
            display:'flex',flexDirection:'column',alignItems:'center',
          }}
        >
          <div style={{fontSize:58,marginBottom:18,filter:'drop-shadow(0 4px 8px rgba(0,0,0,0.3))'}}>{card.icon}</div>
          <h3 style={{color:'#c9a84c',fontSize:24,fontFamily:'Playfair Display,serif',marginBottom:10,textAlign:'center',fontWeight:700}}>{card.label}</h3>
          <p style={{color:'rgba(255,255,255,0.78)',fontSize:14,textAlign:'center',marginBottom:22,lineHeight:1.5}}>{card.desc}</p>
          <div style={{background:'rgba(255,255,255,0.09)',borderRadius:12,padding:'16px 18px',width:'100%',marginBottom:24,border:'1px solid rgba(201,168,76,0.15)'}}>
            <div style={{color:'#c9a84c',fontSize:11,fontWeight:700,letterSpacing:1.5,marginBottom:12,textTransform:'uppercase'}}>Offices to Visit (5)</div>
            {OFFICES_LIST.map((o,oi)=>(
              <div key={oi} style={{display:'flex',alignItems:'center',gap:10,marginBottom:9,paddingBottom:oi<4?'9px':'0',borderBottom:oi<4?'1px solid rgba(255,255,255,0.07)':'none'}}>
                <span style={{width:24,height:24,borderRadius:'50%',background:'#c9a84c',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:'#0f1f3d',flexShrink:0}}>{oi+1}</span>
                <span style={{fontSize:13,color:'rgba(255,255,255,0.88)',fontWeight:500}}>{o.icon} {o.label}</span>
              </div>
            ))}
          </div>
          <button
            style={{
              background: initForm.purpose===card.purpose ? '#e8c97a' : '#c9a84c',
              color:'#0f1f3d', border:'none', borderRadius:10,
              padding:'13px 28px', fontWeight:800, fontSize:15, cursor:'pointer',
              width:'100%', transition:'all .2s',
              boxShadow:'0 2px 8px rgba(201,168,76,0.3)',
              letterSpacing:0.3,
            }}
            onClick={e=>{e.stopPropagation();setInitForm(f=>({...f,purpose:card.purpose}));setTimeout(()=>{
              store.initClearance(user.id,card.purpose,'');
              setShowInit(false);
            },0);}}
          >Select This →</button>
        </div>
      ))}
    </div>
  </div>;

  return <div className="fade-up">

    </div>

    <div className="offices-grid">
      {OFFICE_ORDER.map((officeId,idx)=>{

        const off=clearance.offices[officeId];

        const isOpen=selectedOffice===officeId;
        const dotClass={approved:'dot-approved',rejected:'dot-rejected',submitted:'dot-submitted',not_started:isLocked?'dot-not-started':'dot-not-started'}[off.status]||'dot-not-started';

        return <div key={officeId} className="office-item" style={{opacity:isLocked?.6:1}}>

            <div style={{flex:1}}>

            <StatusBadge status={off.status}/>
            {isLocked&&<span style={{fontSize:12,color:'var(--muted)',marginLeft:8}}>🔒</span>}
            <span style={{color:'var(--muted)',fontSize:18}}>{isOpen?'▲':'▼'}</span>
          </div>

          {isOpen&&<div className="office-body">
            {isLocked&&<div style={{background:'var(--warn-bg)',color:'var(--warn)',padding:'10px 14px',borderRadius:8,fontSize:13,marginBottom:16}}>
              🔒 Complete the previous office first before accessing this one.
            </div>}

            {off.reviewerNote&&<div style={{background:off.status==='approved'?'var(--success-bg)':'var(--danger-bg)',color:off.status==='approved'?'var(--success)':'var(--danger)',padding:'10px 14px',borderRadius:8,fontSize:13,marginBottom:16}}>
              <strong>Office Note:</strong> {off.reviewerNote}
            </div>}

            <div className="step-list">
              {cfg.steps.map((step,si)=>{
                const uploaded=off.steps[step.id];
                return <div key={step.id} className="step-item">
                  <div className="step-num">{si+1}</div>
                  <div className="step-info">
                    <div className="step-title">{step.label}</div>
                    <div className="step-desc">{step.description}</div>
                    {step.type==='questionnaire'&&uploaded&&<div style={{fontSize:12,color:'var(--success)',marginTop:4}}>✅ Questionnaire answered</div>}
                    {step.type==='file'&&uploaded&&<div style={{fontSize:12,color:'var(--success)',marginTop:4}}>✅ {uploaded.name} uploaded</div>}
                  </div>
                  <div className="step-action">
                    {uploaded?<span style={{fontSize:20}}>✅</span>:<span style={{fontSize:20,color:'var(--muted)'}}>⬜</span>}
                  </div>
                </div>;
              })}
            </div>

            {!isLocked&&(off.status==='not_started'||off.status==='rejected')&&<button className="btn btn-primary" style={{marginTop:16}} onClick={()=>handleOpenSubmit(officeId)}>
              {off.status==='rejected'?'🔄 Re-submit Requirements':'📤 Submit Requirements'}
            </button>}
            {off.status==='submitted'&&<div style={{marginTop:16,color:'var(--warn)',fontSize:14}}>⏳ Awaiting office review…</div>}
          </div>}
        </div>;
      })}
    </div>

    {submitModal&&<Modal title={`Submit: ${OFFICES_CONFIG[submitModal].label}`} onClose={()=>setSubmitModal(null)} wide>
      <p style={{color:'var(--muted)',fontSize:14,marginBottom:20}}>Please complete all requirements below. All items are mandatory.</p>
      <div style={{display:'flex',flexDirection:'column',gap:20}}>
        {OFFICES_CONFIG[submitModal].steps.map((step,si)=><div key={step.id} style={{padding:16,border:'1.5px solid var(--border)',borderRadius:10}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
            <div style={{width:24,height:24,borderRadius:'50%',background:'var(--navy)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700}}>{si+1}</div>
            <strong style={{fontSize:14}}>{step.label}</strong>
          </div>
          <p style={{fontSize:13,color:'var(--muted)',marginBottom:12}}>{step.description}</p>
          {step.type==='file'&&<FileUploadZone stepId={step.id} stepLabel={step.label} value={steps[step.id]} onFile={(id,f)=>setSteps(s=>({...s,[id]:f}))}/>}
          {step.type==='questionnaire'&&<QuestionnaireForm questions={step.questions} answers={questAnswers} onChange={(qid,v)=>setQuestAnswers(a=>({...a,[qid]:v}))}/>}
        </div>)}
      </div>
      <div style={{display:'flex',gap:12,marginTop:24}}>
        <button className="btn btn-primary" style={{flex:1,padding:13}} onClick={handleSubmit}>Submit Requirements 📤</button>
        <button className="btn btn-outline" onClick={()=>setSubmitModal(null)}>Cancel</button>
      </div>
    </Modal>}
  </div>;
}

function ClearanceCertificate({user,clearance}){
  const allApproved=clearance&&OFFICE_ORDER.every(id=>clearance.offices[id].status==='approved');
  if(!clearance||!allApproved)return <div className="fade-up">
    <div className="card" style={{textAlign:'center',padding:48}}>
      <div style={{fontSize:64,marginBottom:16}}>🔒</div>
      <h2 style={{color:'var(--navy)',marginBottom:12}}>Certificate Not Yet Available</h2>
      <p style={{color:'var(--muted)',fontSize:15}}>Your clearance certificate will be available once all 5 offices have approved your requirements.</p>
      <div style={{marginTop:24,fontSize:14,color:'var(--muted)'}}>
        {OFFICE_ORDER.filter(id=>clearance?.offices[id].status!=='approved').length} office(s) remaining.
      </div>
    </div>
  </div>;

  const now=new Date();
  const todayStr=now.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const todayShort=now.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'2-digit'});
  const ASCOT_OFFICES=[
    {key:'dean',label:'Department (Director)'},
    {key:'adviser',label:'Adviser / Area Chairman'},
    {key:'library',label:'College Library (Librarian)'},
    {key:'guidance',label:'Office of the Student Affairs (Director)'},
    {key:'treasurer',label:'Accounting Office'},
  ];
  const studentFullName=`${user.lastName}, ${user.firstName}${user.middleName?' '+user.middleName[0]+'.':''}`;
  const purposeMap={'Graduation':'Graduated','Undergraduate':'Graduating','Transferring':'Transferring'};

  const [showEdit,setShowEdit]=useState(false);
  const [editData,setEditData]=useState({
    orNo: clearance.orNo||'',
    semester: clearance.semester||'Summer',
    sy: clearance.sy||'2025–2026',
    contactNo: user.contactNumber||'',
  });
  const setE=(k,v)=>setEditData(d=>({...d,[k]:v}));

  const handleDownloadPdf=async()=>{
    const el=document.getElementById('ascot-cert');
    if(!el){alert('Certificate not found.');return;}
    try{
      const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff'});
      const {jsPDF}=window.jspdf;
      const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      const imgData=canvas.toDataURL('image/jpeg',0.92);
      const pageW=pdf.internal.pageSize.getWidth();
      const pageH=pdf.internal.pageSize.getHeight();
      const ratio=canvas.width/canvas.height;
      let w=pageW-20,h=w/ratio;
      if(h>pageH-20){h=pageH-20;w=h*ratio;}
      pdf.addImage(imgData,'JPEG',(pageW-w)/2,(pageH-h)/2,w,h);
      const name=`${user.lastName}_${user.firstName}_Clearance_Certificate.pdf`.replace(/\s+/g,'_');
      pdf.save(name);
    }catch(e){alert('Download failed: '+e.message);}
  };

  return <div className="fade-up">
    <div style={{display:'flex',gap:12,marginBottom:20,alignItems:'center',justifyContent:'space-between'}} className="no-print">
      <div style={{display:'flex',gap:12}}>
        <button className="btn btn-primary" onClick={()=>window.print()}>🖨️ Print Certificate</button>
        <button className="btn btn-gold" onClick={()=>setShowEdit(true)}>✏️ Edit Details</button>
        <button className="btn btn-success" onClick={handleDownloadPdf}>⬇️ Download PDF</button>
      </div>
      <span style={{fontSize:12,color:'var(--muted)'}}>Date auto-updates in real time · {todayStr}</span>
    </div>

    {showEdit&&<div style={{background:'#fff',border:'1.5px solid var(--border)',borderRadius:12,padding:24,marginBottom:20,maxWidth:520}} className="no-print">
      <h4 style={{marginBottom:16,color:'var(--navy)'}}>Edit Certificate Details</h4>
      <div className="form-row">
        <div className="form-group"><label>O.R. No.</label><input value={editData.orNo} onChange={e=>setE('orNo',e.target.value)} placeholder="22-02-U-9607"/></div>
        <div className="form-group"><label>Contact No.</label><input value={editData.contactNo} onChange={e=>setE('contactNo',e.target.value)} placeholder="09XXXXXXXXX"/></div>
      </div>
      <div className="form-row">
        <div className="form-group"><label>Semester</label><input value={editData.semester} onChange={e=>setE('semester',e.target.value)} placeholder="Summer"/></div>
        <div className="form-group"><label>School Year</label><input value={editData.sy} onChange={e=>setE('sy',e.target.value)} placeholder="2025–2026"/></div>
      </div>
      <button className="btn btn-primary" onClick={()=>setShowEdit(false)}>Save & Close</button>
    </div>}

    {/* ASCOT Certificate */}
    <div id="ascot-cert" style={{
      background:'#fff',
      border:'2px solid #c9a84c',
      borderRadius:4,
      maxWidth:680,
      margin:'0 auto',
      padding:'28px 32px',
      fontFamily:'serif',
      fontSize:12,
    }}>
      {/* Header */}
      <div style={{textAlign:'center',borderBottom:'1.5px solid #c9a84c',paddingBottom:14,marginBottom:14}}>
        <div style={{fontSize:11,color:'#444',marginBottom:2}}>Republic of the Philippines</div>
        <div style={{fontSize:17,fontWeight:900,color:'#0f1f3d',letterSpacing:1,marginBottom:2}}>AURORA STATE COLLEGE OF TECHNOLOGY</div>
        <div style={{fontSize:10,color:'#555',marginBottom:10}}>Brgy. Zabali, 3200 Baler, Aurora, Philippines</div>
        {/* Logo circle */}
        <div style={{width:60,height:60,borderRadius:'50%',border:'2px solid #c9a84c',margin:'0 auto 6px',display:'flex',alignItems:'center',justifyContent:'center',background:'#fff',overflow:'hidden'}}>
          <img src={ASCOT_LOGO} alt="ASCOT" style={{width:54,height:54,objectFit:'contain'}}/>
        </div>
        <div style={{fontSize:10,letterSpacing:2,color:'#555',marginBottom:6}}>OFFICE OF THE COLLEGE REGISTRAR</div>

        {(editData.contactNo||user.contactNumber)&&<><span style={{marginLeft:'auto'}}><strong>Contact No.:</strong> {editData.contactNo||user.contactNumber}</span></>}

      {/* Offices Table */}

  const handleApprove=(uid)=>store.updateStatus(uid,'accepted');

    if(!rejectNote.trim())return alert('Please provide a reason for rejection.');

    setRejectModal(null);setRejectNote('');

  return <div className="fade-up">
    <h2 style={{fontSize:24,color:'var(--navy)',marginBottom:8}}>Registration Requests</h2>

    {pending.length===0?<div className="card" style={{textAlign:'center',padding:40}}><div style={{fontSize:48,marginBottom:16}}>✅</div><p style={{color:'var(--muted)'}}>No pending registrations.</p></div>:<>
      <h3 style={{fontSize:16,color:'var(--warn)',marginBottom:12}}>⏳ Pending ({pending.length})</h3>
      <div className="table-wrap card" style={{padding:0,overflow:'hidden',marginBottom:32}}>
        <table className="data-table">
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Student Info</th><th>Registered</th><th>Actions</th></tr></thead>
          <tbody>{pending.map(u=><tr key={u.id}>
            <td><strong>{u.firstName} {u.lastName}</strong></td>
            <td>{u.email}</td>
            <td><span className="badge badge-info" style={{textTransform:'capitalize'}}>{u.role}</span></td>

              <button className="btn btn-danger btn-sm" onClick={()=>{setRejectModal(u.id);setRejectNote('');}}>❌ Reject</button>
            </div></td>
          </tr>)}</tbody>
        </table>
      </div>
    </>}

    {nonPending.length>0&&<>
      <h3 style={{fontSize:16,color:'var(--navy)',marginBottom:12}}>All Registered Users</h3>
      <div className="table-wrap card" style={{padding:0,overflow:'hidden'}}>

          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Note</th></tr></thead>

            <td>{u.email}</td>

            {u.handledSections?.length>0&&<div style={{fontSize:11,color:'var(--muted)',marginTop:3}}>Sections: {u.handledSections.join(', ')}</div>}
          </td>
            <td><StatusBadge status={u.status}/></td>
            <td style={{fontSize:12,color:'var(--danger)'}}>{u.rejectionNote||'-'}</td>
          </tr>)}</tbody>
        </table>
      </div>
    </>}

    {rejectModal&&ReactDOM.createPortal(
      <div onClick={e=>{if(e.target===e.currentTarget){setRejectModal(null);setRejectNote('');} }} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:9999,overflowY:'auto'}}>
        <div style={{background:'#fff',borderRadius:18,padding:'36px 40px',width:'calc(100% - 80px)',maxWidth:560,margin:'100px auto 60px',position:'relative',boxShadow:'0 8px 48px rgba(0,0,0,0.25)'}}>

            <button onClick={()=>{setRejectModal(null);setRejectNote('');}} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--muted)',lineHeight:1}}>✕</button>
          </div>
          <p style={{color:'var(--muted)',fontSize:14,marginBottom:20,lineHeight:1.6}}>Please provide a reason for rejection. This note will be visible to the applicant.</p>
          <div className="form-group">
            <label>Reason for Rejection *</label>
            <textarea value={rejectNote} onChange={e=>setRejectNote(e.target.value)} placeholder="e.g. Incomplete information, Invalid student ID, Duplicate registration..." rows={5} style={{width:'100%',padding:'10px 14px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:14,outline:'none',resize:'vertical'}}/>
          </div>
          <div style={{display:'flex',gap:12,marginTop:8}}>
            <button className="btn btn-danger" style={{flex:1,padding:12}} onClick={handleReject}>Confirm Rejection</button>
            <button className="btn btn-outline" style={{flex:1,padding:12}} onClick={()=>{setRejectModal(null);setRejectNote('');}}>Cancel</button>
          </div>
        </div>
      </div>,
      document.body
    )}
  </div>;
}

function AdminReleasedClearances(){
  useStore();
  const [search,setSearch]=useState('');
  const [viewCert,setViewCert]=useState(null); // {student, clearance}

  const students=store.getStudents().filter(s=>s.status==='accepted');
  const released=students
    .map(s=>({student:s,clearance:store.getClearance(s.id)}))
    .filter(({clearance})=>clearance&&clearance.overallStatus==='completed');

  const filtered=released.filter(({student:s})=>
    `${s.firstName} ${s.lastName} ${s.studentId} ${s.course}`.toLowerCase().includes(search.toLowerCase())
  );

  const downloadCert=async(student,clearance)=>{
    const el=document.getElementById('admin-cert-preview');
    if(!el){alert('Certificate not visible. Please open the certificate first.');return;}
    try{
      const canvas=await html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff'});
      const {jsPDF}=window.jspdf;
      const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
      const imgData=canvas.toDataURL('image/jpeg',0.92);
      const pageW=pdf.internal.pageSize.getWidth();
      const pageH=pdf.internal.pageSize.getHeight();
      const ratio=canvas.width/canvas.height;
      let w=pageW-20, h=w/ratio;
      if(h>pageH-20){h=pageH-20;w=h*ratio;}
      pdf.addImage(imgData,'JPEG',(pageW-w)/2,(pageH-h)/2,w,h);
      const name=`${student.lastName}_${student.firstName}_Clearance_Certificate.pdf`.replace(/\s+/g,'_');
      pdf.save(name);
    }catch(e){alert('Download failed: '+e.message);}
  };

  return <div className="fade-up">
    <div style={{marginBottom:24}}>
      <h2 style={{fontSize:24,color:'var(--navy)'}}>🎉 Released Clearances</h2>
      <p style={{color:'var(--muted)',fontSize:14,marginTop:4}}>Students whose clearance has been fully approved and released by all offices.</p>
    </div>

    <div style={{marginBottom:16,display:'flex',alignItems:'center',gap:12}}>
      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Search by name, ID, or course..." style={{padding:'10px 14px',border:'1.5px solid var(--border)',borderRadius:8,fontSize:14,flex:1,maxWidth:400,outline:'none'}}/>
      <span className="badge badge-success" style={{fontSize:14,padding:'6px 14px'}}>✅ {released.length} Released</span>
    </div>

    {filtered.length===0
      ?<div className="card" style={{textAlign:'center',padding:48}}>
        <div style={{fontSize:64,marginBottom:16}}>📭</div>
        <h3 style={{color:'var(--navy)',marginBottom:8}}>No Released Clearances Yet</h3>
        <p style={{color:'var(--muted)',fontSize:14}}>Students whose clearance is fully approved will appear here.</p>
      </div>
      :<div className="table-wrap card" style={{padding:0,overflow:'hidden'}}>
        <table className="data-table">
          <thead><tr><th>Student</th><th>Student ID</th><th>Course / Year</th><th>Department</th><th>Purpose</th><th>Completed Date</th><th>Actions</th></tr></thead>
          <tbody>{filtered.map(({student:s,clearance:clr})=>{
            const lastApproved=OFFICE_ORDER.map(id=>clr.offices[id].reviewedAt).filter(Boolean).sort().reverse()[0];
            return <tr key={s.id}>
              <td><strong>{s.lastName}, {s.firstName}</strong><div style={{fontSize:11,color:'var(--muted)'}}>{s.email}</div></td>
              <td>{s.studentId}</td>
              <td style={{fontSize:13}}>{s.course}{s.yearLevel?' — '+s.yearLevel:''}</td>
              <td style={{fontSize:12}}>{s.department}</td>
              <td><span className="badge badge-info">{clr.purpose}</span></td>
              <td style={{fontSize:12}}>{lastApproved?new Date(lastApproved).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}):'—'}</td>
              <td>
                <button className="btn btn-primary btn-sm" onClick={()=>setViewCert({student:s,clearance:clr})}>👁 View Certificate</button>
              </td>
            </tr>;
          })}</tbody>
        </table>
      </div>
    }

    {/* Certificate Modal */}
    {viewCert&&<div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)setViewCert(null);}}>
      <div style={{background:'#fff',borderRadius:18,padding:32,width:'100%',maxWidth:760,position:'relative',margin:'32px auto 48px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
          <h3 style={{fontSize:18,color:'var(--navy)'}}>📜 Clearance Certificate</h3>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-primary btn-sm" onClick={()=>downloadCert(viewCert.student,viewCert.clearance)}>⬇️ Download PDF</button>
            <button className="btn btn-gold btn-sm" onClick={()=>{
              const el=document.getElementById('admin-cert-preview');
              if(!el)return;
              const orig=document.title;
              document.title=`${viewCert.student.lastName}_${viewCert.student.firstName}_Clearance`;
              window.print();
              document.title=orig;
            }}>🖨️ Print</button>
            <button onClick={()=>setViewCert(null)} style={{background:'none',border:'none',fontSize:22,cursor:'pointer',color:'var(--muted)',lineHeight:1}}>×</button>
          </div>
        </div>
        <AdminCertPreview student={viewCert.student} clearance={viewCert.clearance}/>
      </div>
    </div>}
  </div>;
}

function AdminFaculty(){
  useStore();
  const emptyForm={firstName:'',lastName:'',email:'',password:'',facultyType:'dean',deanDepartment:'',adviserName:'',handledSections:[]};
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState(emptyForm);
  const [sectionInput,setSectionInput]=useState('');
  const [error,setError]=useState('');
  const [deleteModal,setDeleteModal]=useState(null);
  const faculty=store.getFaculty();
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const addSection=()=>{
    const s=sectionInput.trim().toUpperCase();
    if(!s)return;
    if(form.handledSections.includes(s))return;
    set('handledSections',[...form.handledSections,s]);
    setSectionInput('');
  };
  const removeSection=(s)=>set('handledSections',form.handledSections.filter(x=>x!==s));

  const handleAdd=()=>{
    setError('');
    if(!form.firstName||!form.lastName||!form.email||!form.password)return setError('All fields are required.');
    if(form.password.length<6)return setError('Password must be at least 6 characters.');
    if(form.facultyType==='dean'&&!form.deanDepartment)return setError('Please select the department for this Dean.');
    if(form.facultyType==='adviser'&&form.handledSections.length===0)return setError('Please add at least one section this adviser handles.');
    const r=store.registerFaculty({...form,role:ROLES.FACULTY});
    if(!r.success)return setError(r.error);
    setShowAdd(false);setForm(emptyForm);setSectionInput('');setError('');
  };

  const handleDelete=(uid)=>{
    store.deleteFaculty(uid);
    setDeleteModal(null);
  };

  return <div className="fade-up">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
      <div>
        <h2 style={{fontSize:24,color:'var(--navy)'}}>Faculty Management</h2>
        <p style={{color:'var(--muted)',fontSize:14,marginTop:4}}>Register faculty accounts. Their credentials are set here by admin.</p>
      </div>
      <button className="btn btn-primary" onClick={()=>{setShowAdd(true);setError('');}}>+ Add Faculty</button>
    </div>

    {faculty.length===0
      ?<div className="card" style={{textAlign:'center',padding:48}}>
        <div style={{fontSize:48,marginBottom:16}}>👨‍🏫</div>
        <h3 style={{color:'var(--navy)',marginBottom:8}}>No Faculty Registered Yet</h3>
        <p style={{color:'var(--muted)',fontSize:14,marginBottom:20}}>Start by adding faculty members. They will log in using the credentials you set.</p>
        <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>+ Add First Faculty Member</button>
      </div>
      :<div className="table-wrap card" style={{padding:0,overflow:'hidden'}}>
        <table className="data-table">
          <thead><tr><th>Name</th><th>Email</th><th>Office / Role</th><th>Assignment</th><th>Status</th><th>Action</th></tr></thead>
          <tbody>{faculty.map(f=><tr key={f.id}>
            <td><strong>{f.firstName} {f.lastName}</strong></td>
            <td style={{fontSize:13}}>{f.email}</td>

                  </span>)}

              <div className="form-group">

      <div onClick={e=>{if(e.target===e.currentTarget)setDeleteModal(null);}} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',zIndex:9999,overflowY:'auto'}}>

function FacultyDashboard({user,onLogout}){
  useStore();
  const [page,setPage]=useState('requests');

  const requests=store.getRequests(user.facultyType,user.facultyType==='dean'?user.deanDepartment:null,user.facultyType==='adviser'?user.handledSections:null);
  const pending=requests.filter(r=>r.offices[user.facultyType]?.status==='submitted');

  return <>
    <Navbar user={user} onLogout={onLogout}/>
    <div className="layout">
      <aside className="sidebar">
        <ul className="sidebar-menu">
          {[{id:'requests',icon:'📋',label:`Pending (${pending.length})`},{id:'reviewed',icon:'✅',label:'Reviewed'}].map(m=><li key={m.id} className={`sidebar-item${page===m.id?' active':''}`} onClick={()=>setPage(m.id)}>
            <span>{m.icon}</span><span>{m.label}</span>
          </li>)}
        </ul>
      </aside>
      <main className="main-content">
        <div className="fade-in">
          <div style={{marginBottom:24}}>
            <h1 style={{fontSize:24,color:'var(--navy)'}}>
              {OFFICES_CONFIG[user.facultyType]?.icon} {OFFICES_CONFIG[user.facultyType]?.label}
            </h1>
            <p style={{color:'var(--muted)',marginTop:4,fontSize:14}}>
              {user.firstName} {user.lastName}
              {user.deanDepartment&&<span> — {user.deanDepartment}</span>}
              {user.facultyType==='adviser'&&user.handledSections?.length>0&&<span> — Sections: {user.handledSections.join(', ')}</span>}
            </p>
          </div>

          {page==='requests'&&<FacultyRequests requests={pending} facultyType={user.facultyType} onSelect={setSelected}/>}
