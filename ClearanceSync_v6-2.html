function FacultyReviewModal({req,facultyType,onClose}){
  const [stepStatus,setStepStatus]=useState({});
  const [note,setNote]=useState('');
  const [submitted,setSubmitted]=useState(false);
  const off=req.offices[facultyType];
  const cfg=OFFICES_CONFIG[facultyType];
  const alreadyReviewed=['approved','rejected'].includes(off.status);

  const handleSubmit=(approved)=>{
    store.reviewOffice(req.studentId,facultyType,approved,note);
    setSubmitted(true);
    setTimeout(onClose,1500);
  };

  if(submitted)return <Modal title="Review Submitted" onClose={onClose}><div style={{textAlign:'center',padding:24}}><div style={{fontSize:64,marginBottom:16}}>✅</div><p>Review submitted successfully.</p></div></Modal>;

  return <Modal title={`Review: ${cfg.label}`} onClose={onClose} wide>
    <div style={{marginBottom:20,padding:16,background:'var(--cream)',borderRadius:10}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,fontSize:14}}>
        {[['Student',`${req.student?.firstName} ${req.student?.lastName}`],['Student ID',req.student?.studentId],['Course',req.student?.course],['Year & Section',`${req.student?.yearLevel} — ${req.student?.section}`],['Department',req.student?.department],['Purpose',req.purpose]].map(([k,v])=><div key={k}><span style={{color:'var(--muted)',fontWeight:500}}>{k}: </span><span>{v}</span></div>)}
      </div>
    </div>

    {alreadyReviewed&&<div style={{background:off.status==='approved'?'var(--success-bg)':'var(--danger-bg)',color:off.status==='approved'?'var(--success)':'var(--danger)',padding:'10px 14px',borderRadius:8,fontSize:13,marginBottom:16}}>
      Already {off.status}: {off.reviewerNote}
    </div>}

    <h4 style={{fontSize:15,color:'var(--navy)',marginBottom:12}}>Submitted Requirements</h4>
    <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:20}}>
      {cfg.steps.map((step,si)=>{
        const uploaded=off.steps[step.id];
        const isOk=stepStatus[step.id];
        return <div key={step.id} style={{padding:16,border:'1.5px solid var(--border)',borderRadius:10,background:isOk===true?'var(--success-bg)':isOk===false?'var(--danger-bg)':'#fff'}}>
          <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:'var(--navy)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,flexShrink:0}}>{si+1}</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:600,fontSize:14,marginBottom:6}}>{step.label}</div>
              {step.type==='file'&&uploaded&&<>
                {uploaded.dataUrl&&uploaded.dataUrl.startsWith('data:image')&&<img src={uploaded.dataUrl} alt="uploaded" style={{maxWidth:200,maxHeight:150,borderRadius:8,border:'1px solid var(--border)',marginBottom:8,display:'block'}}/>}
                <div style={{fontSize:13,color:'var(--success)'}}>📎 {uploaded.name}</div>
              </>}
              {step.type==='questionnaire'&&uploaded&&<div style={{fontSize:13}}>
                <div style={{color:'var(--success)',marginBottom:8}}>✅ Questionnaire answered</div>
                {step.questions.map(q=>{
                  const ans=uploaded.answers?.[q.id];
                  return ans?<div key={q.id} style={{padding:'4px 0',borderBottom:'1px solid var(--border)',fontSize:13}}><span style={{color:'var(--muted)'}}>{q.text}:</span> <strong>{String(ans)}</strong></div>:null;
                })}
              </div>}
              {!uploaded&&<div style={{fontSize:13,color:'var(--danger)'}}>⚠️ No submission for this step</div>}
            </div>
            {!alreadyReviewed&&<div style={{display:'flex',gap:6,flexShrink:0}}>
              <button title="Mark OK" className={`btn btn-sm ${isOk===true?'btn-success':'btn-outline'}`} onClick={()=>setStepStatus(s=>({...s,[step.id]:true}))}>✓</button>
              <button title="Mark Issue" className={`btn btn-sm ${isOk===false?'btn-danger':'btn-outline'}`} onClick={()=>setStepStatus(s=>({...s,[step.id]:false}))}>✕</button>
            </div>}
          </div>
        </div>;
      })}
    </div>

    <div className="form-group">
      <label>Review Note / Message to Student{!alreadyReviewed&&' *'}</label>
      <textarea value={note} onChange={e=>setNote(e.target.value)} placeholder="Describe what was verified, what's missing, or reason for rejection..." rows={3} disabled={alreadyReviewed}/>
    </div>

    {!alreadyReviewed&&<div style={{display:'flex',gap:12}}>
      <button className="btn btn-success" style={{flex:1,padding:13}} onClick={()=>handleSubmit(true)} disabled={!note.trim()}>✅ Approve Clearance</button>
      <button className="btn btn-danger" style={{flex:1,padding:13}} onClick={()=>handleSubmit(false)} disabled={!note.trim()}>❌ Reject</button>
    </div>}
    {!alreadyReviewed&&!note.trim()&&<p style={{fontSize:12,color:'var(--muted)',marginTop:8,textAlign:'center'}}>A review note is required before approving or rejecting.</p>}
  </Modal>;
}

function AdminDatabase(){
  useStore();
  const [confirm,setConfirm]=useState('');
  const [msg,setMsg]=useState('');

  const getDbSize=()=>{
    try{const s=localStorage.getItem('clearsync_db')||'';return(s.length/1024).toFixed(1)+'KB';}catch(e){return'N/A';}
  };
  const getSavedAt=()=>{
    try{const d=JSON.parse(localStorage.getItem('clearsync_db')||'{}');return d.savedAt?new Date(d.savedAt).toLocaleString():'—';}catch(e){return'—';}
  };

  const exportDb=()=>{
    try{
      const data=localStorage.getItem('clearsync_db')||'{}';
      const blob=new Blob([data],{type:'application/json'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=url;a.download='clearsync_backup_'+new Date().toISOString().slice(0,10)+'.json';
      a.click();URL.revokeObjectURL(url);
      setMsg('✅ Database exported successfully!');
    }catch(e){setMsg('❌ Export failed: '+e.message);}
  };

  const importDb=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const parsed=JSON.parse(ev.target.result);
        if(!parsed.users)throw new Error('Invalid backup file — missing users.');
        localStorage.setItem('clearsync_db',ev.target.result);
        setMsg('✅ Database imported! Reloading...');
        setTimeout(()=>window.location.reload(),1500);
      }catch(err){setMsg('❌ Import failed: '+err.message);}
    };
    reader.readAsText(file);
    e.target.value='';
  };

  const clearStudents=()=>{
    if(confirm!=='DELETE STUDENTS'){setMsg('❌ Type the confirmation text exactly.');return;}
    store.users=store.users.filter(u=>u.role!==ROLES.STUDENT);
    store.clearances={};
    store._save();store._emit();
    setConfirm('');setMsg('✅ All student accounts and clearances cleared.');
  };

  const clearAll=()=>{
    if(confirm!=='RESET ALL'){setMsg('❌ Type the confirmation text exactly.');return;}
    localStorage.removeItem('clearsync_db');
    setMsg('✅ Full reset done. Reloading...');
    setTimeout(()=>window.location.reload(),1500);
  };

  const stats=[
    ['👤 Admin Accounts',store.users.filter(u=>u.role===ROLES.ADMIN).length],
    ['🎓 Student Accounts',store.users.filter(u=>u.role===ROLES.STUDENT).length],
    ['👨‍🏫 Faculty Accounts',store.users.filter(u=>u.role===ROLES.FACULTY).length],
    ['📋 Clearance Records',Object.keys(store.clearances).length],
    ['✅ Completed Clearances',Object.values(store.clearances).filter(c=>c.overallStatus==='completed').length],
    ['💾 Storage Used',getDbSize()],
    ['🕐 Last Saved',getSavedAt()],
  ];

  return <div className="fade-up">
    <div style={{marginBottom:28}}>
      <h2 style={{fontSize:24,color:'var(--navy)'}}>💾 Database Manager</h2>
      <p style={{color:'var(--muted)',fontSize:14,marginTop:4}}>All data is stored locally in your browser via <strong>localStorage</strong>. Export regularly to keep backups.</p>
    </div>

    {msg&&<div style={{background:msg.startsWith('✅')?'var(--success-bg)':'var(--danger-bg)',color:msg.startsWith('✅')?'var(--success)':'var(--danger)',padding:'12px 16px',borderRadius:8,marginBottom:20,fontSize:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <span>{msg}</span><button onClick={()=>setMsg('')} style={{background:'none',border:'none',cursor:'pointer',fontSize:18,color:'inherit'}}>×</button>
    </div>}

    {/* Stats Grid */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:16,marginBottom:28}}>
      {stats.map(([label,val])=><div key={label} className="card" style={{padding:'18px 20px',borderLeft:'4px solid var(--navy)'}}>
        <div style={{fontSize:22,fontWeight:700,color:'var(--navy)'}}>{val}</div>
        <div style={{fontSize:12,color:'var(--muted)',marginTop:4}}>{label}</div>
      </div>)}
    </div>

    {/* Backup & Restore */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20,marginBottom:28}}>
      <div className="card">
        <h3 style={{fontSize:16,color:'var(--navy)',marginBottom:8}}>📤 Export Backup</h3>
        <p style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>Download a full JSON backup of all users, clearances, and notifications. Store this file safely.</p>
        <button className="btn btn-primary" style={{width:'100%'}} onClick={exportDb}>⬇️ Download Backup (.json)</button>
      </div>
      <div className="card">
        <h3 style={{fontSize:16,color:'var(--navy)',marginBottom:8}}>📥 Import Backup</h3>
        <p style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>Restore from a previously exported JSON backup. <strong>This will overwrite current data.</strong></p>
        <label style={{display:'block',width:'100%',padding:'10px 20px',background:'var(--gold)',color:'var(--navy)',borderRadius:8,fontWeight:600,fontSize:14,cursor:'pointer',textAlign:'center'}}>
          ⬆️ Choose Backup File
          <input type="file" accept=".json" onChange={importDb} style={{display:'none'}}/>
        </label>
      </div>
    </div>

    {/* Danger Zone */}
    <div className="card" style={{borderLeft:'4px solid var(--danger)'}}>
      <h3 style={{fontSize:16,color:'var(--danger)',marginBottom:4}}>⚠️ Danger Zone</h3>
      <p style={{fontSize:13,color:'var(--muted)',marginBottom:16}}>These actions are irreversible. Type the exact confirmation text before proceeding.</p>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <div style={{padding:16,border:'1.5px solid var(--border)',borderRadius:8}}>
          <div style={{fontWeight:600,fontSize:14,marginBottom:6}}>Clear All Students & Clearances</div>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:10}}>Removes all student accounts and their clearance records. Faculty and admin accounts remain.</div>
          <input placeholder='Type "DELETE STUDENTS" to confirm' value={confirm} onChange={e=>setConfirm(e.target.value)} style={{width:'100%',padding:'8px 12px',border:'1.5px solid var(--border)',borderRadius:6,fontSize:12,marginBottom:8,outline:'none'}}/>
          <button className="btn btn-danger btn-sm" style={{width:'100%'}} onClick={clearStudents}>🗑 Clear Students</button>
        </div>
        <div style={{padding:16,border:'1.5px solid var(--danger)',borderRadius:8,background:'#fff5f5'}}>
          <div style={{fontWeight:600,fontSize:14,marginBottom:6,color:'var(--danger)'}}>Full System Reset</div>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:10}}>Wipes <strong>everything</strong> including faculty. Only default admin accounts will remain after reload.</div>
          <input placeholder='Type "RESET ALL" to confirm' value={confirm} onChange={e=>setConfirm(e.target.value)} style={{width:'100%',padding:'8px 12px',border:'1.5px solid var(--danger)',borderRadius:6,fontSize:12,marginBottom:8,outline:'none'}}/>
          <button className="btn btn-danger btn-sm" style={{width:'100%'}} onClick={clearAll}>💥 Full Reset</button>
        </div>
      </div>
    </div>
  </div>;
}

// ============================================================
// APP ROUTER (Controller)
// ============================================================
const AUTO_LOGOUT_MS = 5 * 60 * 1000; // 5 minutes
const WARN_AT_MS = 60 * 1000;          // warn 1 minute before

function App(){
  const [screen,setScreen]=useState('landing');
  const [selectedRole,setSelectedRole]=useState(null);
  const [selectedFacultyType,setSelectedFacultyType]=useState(null);
  const [currentUser,setCurrentUser]=useState(null);
  const [countdown,setCountdown]=useState(null); // seconds remaining when warning shown
  const timerRef=React.useRef(null);
  const warnRef=React.useRef(null);
  const countRef=React.useRef(null);

  const clearAllTimers=()=>{
    clearTimeout(timerRef.current);
    clearTimeout(warnRef.current);
    clearInterval(countRef.current);
    setCountdown(null);
  };

  const doLogout=(auto=false)=>{
    clearAllTimers();
    try{sessionStorage.removeItem('clearsync_session');}catch(e){}
    setCurrentUser(null);setSelectedRole(null);setSelectedFacultyType(null);setScreen('landing');
    if(auto)setTimeout(()=>alert('⏱️ You were automatically logged out due to 5 minutes of inactivity.'),100);
  };

  const resetTimer=()=>{
    if(!currentUser)return;
    clearAllTimers();
    // warn 1 min before logout
    warnRef.current=setTimeout(()=>{
      setCountdown(60);
      countRef.current=setInterval(()=>{
        setCountdown(c=>{
          if(c<=1){clearInterval(countRef.current);return 0;}
          return c-1;
        });
      },1000);
    }, AUTO_LOGOUT_MS - WARN_AT_MS);
    // actual logout
    timerRef.current=setTimeout(()=>doLogout(true), AUTO_LOGOUT_MS);
  };

  // Start/reset timer on user activity
  useEffect(()=>{
    if(!currentUser){clearAllTimers();return;}
    const events=['mousemove','mousedown','keydown','touchstart','scroll','click'];
    const handler=()=>{resetTimer();};
    events.forEach(e=>window.addEventListener(e,handler,{passive:true}));
    resetTimer();
    // restore session
    try{sessionStorage.setItem('clearsync_session',JSON.stringify({userId:currentUser.id,role:currentUser.role}));}catch(e){}
    return()=>{events.forEach(e=>window.removeEventListener(e,handler));clearAllTimers();};
  },[currentUser]);

  const handleLogin=()=>setScreen('role');
  const handleRoleSelect=(role)=>{
    setSelectedRole(role);
    if(role===ROLES.FACULTY)setScreen('faculty-type');
    else setScreen('auth');
  };
  const handleFacultyType=(type)=>{setSelectedFacultyType(type);setScreen('auth');};
  const handleAuthSuccess=(user)=>{setCurrentUser(user);setScreen('dashboard');};
  const handleLogout=()=>doLogout(false);

  return <>
    {/* Auto-logout warning banner */}
    {countdown!==null&&currentUser&&<div style={{
      position:'fixed',top:0,left:0,right:0,zIndex:9999,
      background:'#7c1a1a',color:'#fff',
      padding:'12px 24px',display:'flex',alignItems:'center',justifyContent:'space-between',
      fontSize:14,boxShadow:'0 2px 12px rgba(0,0,0,.4)',
      animation:'fadeIn .3s ease'
    }}>
      <span>⏱️ <strong>Session expiring in {countdown}s</strong> due to inactivity. Move your mouse or press any key to stay logged in.</span>
      <button onClick={()=>resetTimer()} style={{background:'var(--gold)',color:'#7c1a1a',border:'none',borderRadius:6,padding:'6px 16px',fontWeight:700,cursor:'pointer',fontSize:13}}>
        Stay Logged In
      </button>
    </div>}

    {screen==='landing'&&<Landing onLogin={handleLogin}/>}
    {screen==='role'&&<RoleSelector onSelect={handleRoleSelect} onBack={()=>setScreen('landing')}/>}
    {screen==='faculty-type'&&<FacultyTypeSelector onSelect={handleFacultyType} onBack={()=>setScreen('role')}/>}
    {screen==='auth'&&<AuthForm role={selectedRole} facultyType={selectedFacultyType} onSuccess={handleAuthSuccess} onBack={()=>setScreen(selectedRole===ROLES.FACULTY?'faculty-type':'role')}/>}
    {screen==='dashboard'&&currentUser&&(
      currentUser.role===ROLES.ADMIN?<AdminDashboard user={currentUser} onLogout={handleLogout}/>:
      currentUser.role===ROLES.FACULTY?<FacultyDashboard user={currentUser} onLogout={handleLogout}/>:
      <StudentDashboard user={currentUser} onLogout={handleLogout}/>
    )}
    {screen!=='landing'&&screen!=='role'&&screen!=='faculty-type'&&screen!=='auth'&&!currentUser&&<Landing onLogin={handleLogin}/>}
  </>;
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
